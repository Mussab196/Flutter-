name: visionaid_app
description: A vision aid mobile application built with Flutter
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  go_router: ^12.1.3
  camera: ^0.10.5+5
  path_provider: ^2.1.1
  flutter_svg: ^2.0.9
  flutter_animate: ^4.2.0+1
  google_fonts: ^6.1.0
  cached_network_image: ^3.3.0
  url_launcher: ^6.2.2
  geolocator: ^10.1.0
  permission_handler: ^11.0.1
  http: ^1.1.0
  flutter_tts: ^3.8.5
  google_mlkit_text_recognition: ^0.14.0
  image_picker: ^1.0.4
  
  # YOLOv8s Object Detection
  ultralytics_yolo: ^0.1.42
  
  # Firebase packages
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  google_sign_in: ^6.2.1
  google_mlkit_object_detection: ^0.14.0
  google_mlkit_face_detection: ^0.12.0
  tflite_flutter: ^0.12.1
  google_generative_ai: ^0.4.7
  speech_to_text: ^7.3.0
  sensors_plus: ^7.0.0
  volume_controller: ^3.4.4
  image: ^4.8.0
  screen_brightness: ^2.1.9
  torch_light: any
  battery_plus: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/images/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/models/mobilefacenet.tflite
    - assets/models/yolov8s_float32.tflite